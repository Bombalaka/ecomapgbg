services:
  mongodb:
    image: mongo:latest
    container_name: ecomapgbg-mongo
    restart: always
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mongo_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-expressv2
    restart: always
    ports:
      - "8084:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongodb
    depends_on:
      - mongodb
    networks:
      - mongo_network
  eco_map_gbg:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN:-}
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/ecomapgbg?authSource=admin
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - mongodb
    networks:
      - mongo_network

volumes:
  mongodb_data:

networks:
  mongo_network:
    driver: bridge